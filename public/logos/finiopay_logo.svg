<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <title>FinioPay Logo</title>

  <!-- Background -->
  <rect width="500" height="500" fill="#F0F4FA" rx="40"/>

  <!-- Outer ring -->
  <circle cx="250" cy="210" r="130" fill="#185FA5"/>
  <!-- Inner background -->
  <circle cx="250" cy="210" r="118" fill="#042C53"/>

  <!-- Accent arc -->
  <path d="M 340 95 A 128 128 0 0 1 378 210" stroke="#378ADD" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 355 108 A 115 115 0 0 1 365 155" stroke="#85B7EB" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Stylized F -->
  <rect x="200" y="148" width="16" height="130" rx="5" fill="#E6F1FB"/>
  <rect x="200" y="148" width="80" height="16" rx="5" fill="#E6F1FB"/>
  <rect x="200" y="197" width="60" height="14" rx="5" fill="#85B7EB"/>

  <!-- Pay badge circle -->
  <circle cx="308" cy="270" r="32" fill="#378ADD"/>
  <circle cx="308" cy="270" r="26" fill="#185FA5"/>
  <text x="308" y="279" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#E6F1FB">₹</text>

  <!-- Brand name -->
  <text x="250" y="390" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#185FA5">Finio<tspan fill="#378ADD">Pay</tspan></text>

  <!-- Tagline -->
  <text x="250" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888780" letter-spacing="3">SMART EXPENSE TRACKER</text>

  <!-- Decorative dots -->
  <circle cx="108" cy="210" r="6" fill="#B5D4F4" opacity="0.4"/>
  <circle cx="92" cy="180" r="4" fill="#B5D4F4" opacity="0.25"/>
  <circle cx="392" cy="210" r="6" fill="#B5D4F4" opacity="0.4"/>
  <circle cx="408" cy="240" r="4" fill="#B5D4F4" opacity="0.25"/>
</svg>
